# ---------------------------------------------------------------------------
# merchants.yaml — the SINGLE SOURCE OF TRUTH for the demo.
#
# Every merchant here is invented. Each entry drives TWO things at once:
#   1. the `description`/`payee` strings written into the fake JSON, and
#   2. a regenerated seed_merchant_category_regex_mapping.csv row, so the dbt
#      regex categorizer keeps matching 100% of the demo data (no **UNKNOWN**,
#      assert_no_unknown_merchants stays green).
# That coupling is the whole point: change a merchant here and both sides move
# together.
#
# Fields per merchant:
#   name        display / title-case brand
#   token       lowercase substring embedded in the description AND used as the
#               regex alternate. Keep it distinctive (it must not accidentally
#               match another category).
#   category / subcategory   must exist in the taxonomy the dashboards expect.
#   account     "checking" (debit POS / ACH) or "credit" (Visa Signature card)
#   amount      [min, max] typical absolute charge (generator applies sign)
#   weight      relative draw frequency for discretionary purchases (0 = never
#               drawn randomly; used only for recurring/irregular flows)
#   format      optional description style override:
#                 pos_debit | pos_alt | ach | cc_purchase | cc_tst
#               (defaults: checking -> pos_debit, credit -> cc_purchase)
#   priority    optional regex match_priority (default 10; lower wins)
# ---------------------------------------------------------------------------

