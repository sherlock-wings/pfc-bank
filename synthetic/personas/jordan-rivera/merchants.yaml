# ---------------------------------------------------------------------------
# Structural seed rows. These are NOT merchants — they are the bank's own
# machine-generated descriptors (transfers, dividends, payroll, tax, interest,
# atm, p2p, etc). They are regenerated verbatim into the seed CSV with their
# original match priorities so category precedence is preserved. The generator
# emits transactions whose descriptions contain these tokens.
# ---------------------------------------------------------------------------
structural_seed_rows:
  - {category: debt,      subcategory: credit card interest,  regex: "interest charge",                    priority: 10}
  - {category: debt,      subcategory: credit card payment,   regex: "transfer to credit card",            priority: 5}
  - {category: debt,      subcategory: mortgage,              regex: "transfer to mortgage",               priority: 5}
  - {category: fees,      subcategory: atm,                   regex: "atm withdrawal|atm fee",             priority: 10}
  - {category: fees,      subcategory: taxes,                 regex: "federal tax|fed tax",                priority: 10}
  - {category: fees,      subcategory: international,         regex: "international transaction fee|intl transaction", priority: 1}
  - {category: payments,  subcategory: peer to peer,          regex: "zelle|venmo",                        priority: 10}
  - {category: payments,  subcategory: paycheck,              regex: "meridian|northstar peo",             priority: 10}
  - {category: payments,  subcategory: dividend,              regex: "dividend",                           priority: 10}
  - {category: payments,  subcategory: online payment,        regex: "nfo payment",                        priority: 10}
  - {category: payments,  subcategory: rewards,               regex: "reward redemption|atm rebate",       priority: 10}
  - {category: payments,  subcategory: refunds,               regex: "pos adjustment",                     priority: 1}
  - {category: transfers, subcategory: other account,         regex: "transfer to|transfer from",          priority: 10}
