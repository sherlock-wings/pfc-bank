name: nfcu-pipe extract   # fires every 90 min; extract.py stops once today's refresh is captured

on:
  schedule:
    # Every 90 min, clock-anchored to 00:00 (16 slots/day, first 00:00, last 22:30).
    # Two entries because cron can't express a 90-min interval in one line.
    - cron: "0 0,3,6,9,12,15,18,21 * * *"    # 00:00 03:00 06:00 09:00 12:00 15:00 18:00 21:00
    - cron: "30 1,4,7,10,13,16,19,22 * * *"  # 01:30 04:30 07:30 10:30 13:30 16:30 19:30 22:30
  workflow_dispatch:

permissions:
  id-token: write   # mint the OIDC token used to assume the AWS role
  contents: read

jobs:
  extract:
    runs-on: ubuntu-latest
    environment: dev   # loads the dev-scoped vars/secret (AWS_ROLE_ARN, S3_PREFIX, SIMPLEFIN_ACCESS_URL)
    env:
      S3_BUCKET: pfc-nfcu
      S3_PREFIX: ${{ vars.S3_PREFIX }}            # set to _demo/transactions for Phase 0
      SIMPLEFIN_ACCESS_URL: ${{ secrets.SIMPLEFIN_ACCESS_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-2
      - run: uv run extract.py
