name: deploy dashboard

on:
  workflow_dispatch:           # manual button
  workflow_run:                # auto-run after new data is built
    workflows: ["nfcu-pipe extract"]
    types: [completed]
  push:                        # UI changes go live now, not on the next data refresh
    branches: [main]
    paths:
      - 'dashboard/**'
      - '.github/workflows/deploy_dashboard.yml'

permissions:
  id-token: write              # assume the AWS role
  contents: read

jobs:
  deploy:
    # run on manual dispatch, on a UI push, or when the upstream extract
    # succeeded (the last also skips the extract's "no new data" path)
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4   # gives DuckDB S3 read via env creds
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      # Build the dashboard's runtime config in .env.local (git-ignored), which
      # Evidence loads. The committed .env.example is a template only — Evidence
      # does NOT auto-load *.example — so CI must materialize these values here.
      #   - data_root: the S3 prefix DuckDB reads dashboard_mart parquet from.
      #     Without it, sources render read_parquet('${data_root}/...') literally,
      #     no parquet is built, and every tile fails "Table ... does not exist".
      #     Set DASHBOARD_DATA_ROOT as a `dev` env var; falls back to the same
      #     default committed in .env.example so the build never silently breaks.
      #   - family_name / home_address: display labels kept out of git. Set
      #     DASHBOARD_FAMILY_NAME / DASHBOARD_HOME_ADDRESS as `dev` env vars to
      #     show real values; if unset they fall back to the same generic
      #     placeholders committed in .env.example (Evidence never loads that
      #     template, so without these fallbacks an unset var would render the
      #     raw "${family_name}" / "${home_address}" string on the live site).
      - name: Build dashboard runtime config (kept out of git)
        env:
          DATA_ROOT: ${{ vars.DASHBOARD_DATA_ROOT }}
          FAM: ${{ vars.DASHBOARD_FAMILY_NAME }}
          ADDR: ${{ vars.DASHBOARD_HOME_ADDRESS }}
        run: |
          : > .env.local
          echo "EVIDENCE_VAR__data_root=${DATA_ROOT:-s3://pfc-nfcu}"    >> .env.local
          echo "EVIDENCE_VAR__family_name=${FAM:-Sample}"              >> .env.local
          echo "EVIDENCE_VAR__home_address=${ADDR:-123 Example St}"    >> .env.local

      - run: npm run sources      # runs SQL against S3, writes parquet into the build
      - run: npm run build        # produces dashboard/build/

      # Cloudflare Pages rejects any file >25 MiB; the DuckDB WASM engine is 33-38 MiB.
      # Move those files out of the Pages upload, push them to R2, and rewrite the
      # dashboard's references to the R2 URL. Background: workbench/context.md.
      - name: Offload DuckDB WASM to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          WASM_CDN_BASE: https://duckdb.patrick-f-callahan.net   # R2 bucket's public custom domain
          R2_BUCKET: pfc-finance-wasm
        run: |
          bash ./scripts/offload-wasm.sh build
          for f in build-wasm-offload/*.wasm; do
            npx --yes wrangler@3.90.0 r2 object put \
              "${R2_BUCKET}/$(basename "$f")" \
              --file="$f" --content-type=application/wasm \
              --cache-control="public, max-age=31536000, immutable"
          done

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: dashboard
          command: pages deploy build --project-name=pfc-finance --branch=main