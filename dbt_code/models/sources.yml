version: 2

sources:
  - name: nfcu_raw
    schema: main
    tables:
      - name: transactions 
        description: "Raw transaction data streamed from S3"
        config:
          # The exact S3 path where DuckDB should look
          # yaml rendering can't see project macros, only var()/env_var(); the
          # SQL layer uses the data_path() macro for the same data_root anchor.
          external_location: "{{ var('data_root') }}/transactions/*/*/*/*.json"