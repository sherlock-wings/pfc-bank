version: 2

models:
  - name: daily_tally
    description: "Daily end-of-day balance per bank account. Uses the bank-reported balance (dim_accounts) wherever available, and walks backward from the earliest reported balance via transaction deltas for dates before reporting coverage begins. Also carries month-over-month change vs the same calendar day one month prior."

    columns:
      - name: account
        data_type: text
        description: "The bank account this daily balance is for."
      - name: posted_date
        data_type: date
        description: "Calendar date. One row per account per day from first activity through today (no gaps)."
      - name: eod_txn_count
        data_type: bigint
        description: "Number of transactions posted on this date for this account (0 on days with no activity)."
      - name: acnt_balance
        data_type: decimal(12,2)
        description: "End-of-day balance for this account: the bank-reported balance where the bank reported one, else the backward-anchored transaction walk for pre-coverage dates."
      - name: last_month_balance
        data_type: decimal(12,2)
        description: "acnt_balance on the same calendar day one month earlier (null before coverage/history begins)."
      - name: mom_dollars_change
        data_type: decimal(12,2)
        description: "Dollars gained/lost between this date and one month prior (acnt_balance - last_month_balance)."
      - name: mom_pcnt_change
        data_type: decimal(14,4)
        description: "Percent change between this date and one month prior."
