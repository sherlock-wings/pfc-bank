version: 2

models:
  - name: daily_tally
    description: "Daily-level balance from all transactions across all bank accounts."

    columns:
      - name: account
        data_type: text
        description: "The bank account for which we are comparing MoM balance change on a daily basis. Includes 'ALL' (meaning MoM balance across all accounts) as an option."
      - name: posted_date
        data_type: date
        description: "The date on which one or more transactions where posted."
      - name: acnt_balance
        data_type: decimal(12,2)
        description: "The total balance when summing all money gained and lost for that calendar date."
      - name: last_month_balance
        data_type: decimal(12,2)
        description: "The eod_balance on the previous month, same date as the current record."
      - name: mom_dollars_change
        data_type: decimal(12,2)
        description: "The dollars gained/lost between the current date and one month previous."
      - name: mom_pcnt_change
        data_type: decimal(14,4)
        description: "The percent of dollars gained/lost between the current date and one month previous."
      