version: 2

models:
  - name: fact_transactions
    description: "Detail-level transactions from all bank accounts."

    columns:
      - name: bank_account_id
        data_type: text
        description: "Natural key for bank accounts-- some kind of UUID."
        tests:
          - not_null
      - name: bank_account_name
        data_type: text
        description: "Name of the NFCU Bank account."
      - name: txn_id
        data_type: text
        description: "Unique UUID for each transaction."
        tests: 
          - unique
          - not_null
      - name: description
        data_type: text
        description: "NFCU Generated transaction description."
      - name: payee
        data_type: text
        description: "The name would suggest that this field contains a name or description of who was paid the money in the transcation. It looks more like the same content as `description` but just less detailed. So not sure."
      - name: amount
        data_type: decimal(14,2)
        description: "Currency amount gained/lost in the transaction."
      - name: posted_at_timestamp
        data_type: timestamptz
        description: "The time at which the transaction was posted to the SimpleFIN/MX Aggregator."
      - name: filename
        data_type: text
        description: "Name of the file (stored in S3) that contains the given record."
      - name: record_loaded_at_timestamp
        data_type: timestamptz
        description: "The time at which the given record was loaded to s3."
              
