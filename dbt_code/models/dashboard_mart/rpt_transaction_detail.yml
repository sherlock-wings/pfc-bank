version: 2

models:
  - name: rpt_transaction_detail
    description: "Detail-level transactions from all bank accounts."

    columns:
      - name: calendar_date
        data_type: date
        description: "The date for the given record. May or may not correspond to a day on which transactions actually occur. We fill out empty days like this so we can always do month-over-month daily comparisons. These comparisons require a record for every day on the calendar; Otherwise, it is possible for a comparison on some day to not find a corresponding record on the previous month for the same date."
      - name: posted_at_timestamp
        data_type: timestamptz
        description: "The time at which the transaction was posted to the SimpleFIN/MX Aggregator."
      - name: merchant_category
        data_type: text
        description: "General category for the given merchant."
      - name: merchant_subcategory
        data_type: text
        description: "More specific category for the given merchant."
      - name: merchant
        data_type: text
        description: "The name would suggest that this field contains a name or description of who was paid the money in the transcation. It looks more like the same content as `description` but just less detailed. So not sure."
      - name: txn_description
        data_type: text
        description: "NFCU Generated transaction description."
      - name: account
        data_type: text
        description: "Name of the NFCU Bank account."
      - name: txn_amount
        data_type: decimal(12,2)
        description: "Currency amount gained/lost in the transaction."
      - name: this_acnt_running_balance
        data_type: decimal(12,2)
        description: "Cumulative balance for this row's account as of the point after the current row's transaciton."
        tests:
          - not_null
      - name: all_acnts_running_balance
        data_type: decimal(12,2)
        description: "Cumulative balance across all accounts as of the point after the current row's transaciton."
        tests:
          - not_null
      