version: 2

models:
  - name: rpt_expenses_detail
    description: "Detail-level transactions from all bank accounts."

    columns:
      - name: posted_at_timestamp
        data_type: timestamptz
        description: "The time at which the transaction was posted to the SimpleFIN/MX Aggregator."
      - name: merchant_category
        data_type: text
        description: "General category for the given merchant."
      - name: merchant_subcategory
        data_type: text
        description: "More specific category for the given merchant."
      - name: merchant
        data_type: text
        description: "The name would suggest that this field contains a name or description of who was paid the money in the transcation. It looks more like the same content as `description` but just less detailed. So not sure."
      - name: txn_description
        data_type: text
        description: "NFCU Generated transaction description."
      - name: account
        data_type: text
        description: "Name of the NFCU Bank account."
      - name: amount_spent
        data_type: decimal(18,2)
        description: "Currency amount gained/lost in the transaction."
      