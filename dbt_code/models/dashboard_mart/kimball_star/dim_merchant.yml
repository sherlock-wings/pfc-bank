version: 2

models:
  - name: dim_merchant
    descripotion: "A listing of all the merchants I buy stuff from."
    columns:
      - name: merchant_category_key
        data_type: text
        description: "MD5 hash of the NFCU generated label and description for the Merchant receiving payment in a given transaction."
        tests:
          - not_null
      - name: merchant_name
        data_type: text
        description: "NFCU generated label for the Merchant receiving payment in a given transaction."
        tests:
          - not_null:
              config:
                severity: warn
      - name: merchant_category
        data_type: text
        tests:
          - not_null:
              config:
                severity: warn
        description: "General category for the given merchant, inferred by matching txn_description against map_merchant_category_regex."
      - name: merchant_subcategory
        data_type: text
        description: "More specific category for the given merchant."
        tests:
          - not_null:
              config:
                severity: warn
      - name: earliest_txn_at
        data_type: timestamptz
        description: "The earliest time this merchant is seen in transactions data."
      - name: latest_txn_at
        data_type: timestamptz
        description: "The latest time this merchant is seen in transactions data."
      - name: total_transactions
        data_type: bigint
        description: "The total count for transactions with a given payee."
      - name: total_amount
        data_type: decimal(38,2)
        description: "Total currency exchanged with the given merchant overall."
      - name: amount_past_day
        data_type: decimal(38,2)
        description: "Total currency exchanged with the given merchant in the past day."
      - name: amount_past_week
        data_type: decimal(38,2)
        description: "Total currency exchanged with the given merchant in the past week."
      - name: amount_past_month
        data_type: decimal(38,2)
        description: "Total currency exchanged with the given merchant in the past month."
      - name: amount_past_quarter
        data_type: decimal(38,2)
        description: "Total currency exchanged with the given merchant in the past quarter."
      - name: amount_past_year
        data_type: decimal(38,2)
        description: "Total currency exchanged with the given merchant in the past year."
      - name: record_updated_at
        data_type: timestamptz
        description: "Time at which the given record was last written to S3."
        