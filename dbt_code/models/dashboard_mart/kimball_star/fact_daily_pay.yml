version: 2

models:
  - name: fact_daily_pay
    description: "Fact table that deduces the total income earned for every calendar day during a pay-monitored period."
    columns:
      - name: calendar_date
        data_type: date
        description: "The calendar date the daily income is attributed to."
      - name: calendar_quarter
        data_type: utinyint
        description: "The calendar quarter the daily income is attributed to."
      - name: daily_income
        data_type: decimal(12,2)
        description: "The dollar amount of income attributed to the given day."
      - name: from_employer
        data_type: text
        description: "The name of the employer the daily income is attributed to"