version: 2

models:
  - name: rpt_mom_performance
    description: "Month-over-month (MoM) report comparing account balance, average daily spend, and daily over/under color counts against the same day-of-month in the prior month. Columns prefixed or suffixed with `mom` (e.g. `dollars_mom_balance_delta`) hold a month-over-month comparison value."

    columns:
      - name: as_of_date
        data_type: date
        description: "The date as of which the report was last refeshed. So if the report says your account balance is $100, that menas that is the balance as of whatever date appears in this column."
      - name: year
        data_type: utinyint
        description: "The year for the monthly account balance being compared."
      - name: month
        data_type: utinyint
        description: "The number of the month for the monthly account balance being compared."
      - name: current_monthly_balance
        data_type: decimal(12,2)
        description: "The summed balance of all transactions across all accounts as of a particular day of the month. So if the as_of_date = 2026-06-15, then each row shows the account balance as of the 15th for each given month. If the AS_OF_DATE falls on thr 31st, and the month for the given row does not have 31 days, then the row uses the latest date available for the given month (i.e. 30, 29, or 28 days, depending on the month/year)."
      - name: this_time_last_month_balance
        data_type: decimal(12,2)
        description: "Same value as current_monthly_balance, but for the given row's previous year-month."
      - name: dollars_mom_balance_delta
        data_type: decimal(12,2)
        description: "current_monthly_balance minus this_time_last_month_balance, in dollars."
      - name: pcnt_mom_balance_delta
        data_type: decimal(14,4)
        description: "dollars_mom_balance_delta as a percent of this_time_last_month_balance. Null when this_time_last_month_balance is 0."
      - name: avg_daily_spend
        data_type: decimal(12,2)
        description: "Average daily spend for the given year-month, rounded to the nearest dollar."
      - name: last_month_avg_daily_spend
        data_type: decimal(12,2)
        description: "Same value as avg_daily_spend, but for the given row's previous year-month."
      - name: dollars_mom_avg_daily_spend_delta
        data_type: decimal(12,2)
        description: "avg_daily_spend minus last_month_avg_daily_spend, in dollars."
      - name: pcnt_mom_avg_daily_spend_delta
        data_type: decimal(14,4)
        description: "dollars_mom_avg_daily_spend_delta as a percent of last_month_avg_daily_spend. Null when last_month_avg_daily_spend is 0."
      - name: total_green_days
        data_type: utinyint
        description: "Count of Green (mostly-gain) days from rpt_daily_overunder for the given year-month."
      - name: last_month_total_green_days
        data_type: utinyint
        description: "Same value as total_green_days, but for the given row's previous year-month."
      - name: mom_total_green_days_change
        data_type: decimal(12,2)
        description: "total_green_days minus last_month_total_green_days."
      - name: pcnt_mom_total_green_days
        data_type: decimal(14,4)
        description: "mom_total_green_days_change as a percent of last_month_total_green_days. Null when last_month_total_green_days is 0."
      - name: total_red_days
        data_type: utinyint
        description: "Count of Red (mostly-loss) days from rpt_daily_overunder for the given year-month."
      - name: last_month_total_red_days
        data_type: utinyint
        description: "Same value as total_red_days, but for the given row's previous year-month."
      - name: mom_total_red_days_change
        data_type: decimal(12,2)
        description: "total_red_days minus last_month_total_red_days."
      - name: pcnt_mom_total_red_days
        data_type: decimal(14,4)
        description: "mom_total_red_days_change as a percent of last_month_total_red_days. Null when last_month_total_red_days is 0."
      - name: total_grey_days
        data_type: utinyint
        description: "Count of Grey (mostly-break-even) days from rpt_daily_overunder for the given year-month."
      - name: last_month_total_grey_days
        data_type: utinyint
        description: "Same value as total_grey_days, but for the given row's previous year-month."
      - name: mom_total_grey_days_change
        data_type: decimal(12,2)
        description: "total_grey_days minus last_month_total_grey_days."
      - name: pcnt_mom_total_grey_days
        data_type: decimal(14,4)
        description: "mom_total_grey_days_change as a percent of last_month_total_grey_days. Null when last_month_total_grey_days is 0."
      - name: total_black_days
        data_type: utinyint
        description: "Count of Black (exactly break-even) days from rpt_daily_overunder for the given year-month."
      - name: last_month_total_black_days
        data_type: utinyint
        description: "Same value as total_black_days, but for the given row's previous year-month."
      - name: mom_total_black_days_change
        data_type: decimal(12,2)
        description: "total_black_days minus last_month_total_black_days."
      - name: pcnt_mom_total_black_days
        data_type: decimal(14,4)
        description: "mom_total_black_days_change as a percent of last_month_total_black_days. Null when last_month_total_black_days is 0."
