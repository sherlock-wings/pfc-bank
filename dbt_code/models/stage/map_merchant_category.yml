version: 2

models:
  - name: map_merchant_category
    description: "Passthrough view containing merchant categories."

    columns:

      - name: merchant_category_key
        data_type: text
        description: "MD5 hash of the merchant name. Used to join the merchant_category map to dim_merchant."
        tests: 
        - relationships:
            arguments:
              to: ref('dim_merchant')
              field: merchant_category_key
            config: 
              severity: warn   
                    
      - name: merchant_name
        data_type: text
        description: "Name of the person or busienss with whom I'm exchanging money in a given transaction."
        tests:
          - not_null:
              config:
                severity: warn
              
      - name: txn_description
        data_type: text
        description: "POS-generated description of the transaction with the merchant."
        tests:
          - not_null:
              config:
                severity: warn
              
      - name: merchant_category
        data_type: text
        description: "Category of purchase (home-goods, cost-of-living, etc.)"
        tests: 
          - not_null:
              config:
                severity: warn
              
      - name: merchant_subcategory
        data_type: text
        description: "Subcategory of purchase (video-games, gas, etc.)"
      - name: last_updated_timestamp
        data_type: timestamptz
        description: "Last time the given record from the merchant mapping (mantained by hand) was updated."